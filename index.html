<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ruflo-test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }
    h1 { font-size: 2rem; font-weight: 300; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
    p { color: #888; margin-bottom: 2.5rem; font-size: 0.95rem; }
    .cards { display: flex; flex-direction: column; gap: 1rem; }
    a.card {
      display: block;
      padding: 1.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }
    a.card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .card h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.4rem; }
    .card span { font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ruflo-test</h1>
    <p>Two vanilla web apps, zero dependencies</p>
    <div class="cards">
      <a class="card" href="src/">
        <h2>To-Do</h2>
        <span>Add, edit, filter, drag-and-drop reorder, due dates, localStorage</span>
      </a>
      <a class="card" href="ephemera/">
        <h2>Ephemera</h2>
        <span>A thought journal where entries decay like memories</span>
      </a>
    </div>
  </div>
</body>
</html>
