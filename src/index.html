<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>To-Do</h1>
    <form id="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="What needs to be done?"
        required
        autocomplete="off"
      >
      <button type="submit">Add</button>
    </form>
    <ul id="todo-list"></ul>
    <p id="empty-state" class="empty" hidden>No to-dos yet. Add one above!</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
